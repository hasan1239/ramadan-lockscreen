<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/svg+xml" href="/iqamah-icon.svg">
  <link rel="icon" type="image/png" href="/iqamah-icon.png">
  <link rel="manifest" href="/manifest.json">

  <title>Iqamah - Daily Prayer Times</title>

  <!-- FOUC prevention: sync theme before render -->
  <script>
    (function() {
      function syncTheme() {
        var stored = localStorage.getItem('iqamah-theme') || localStorage.getItem('prayerly-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var shouldBeLight = stored === 'light' || (!stored && !prefersDark);
        var isLight = document.documentElement.classList.contains('light-mode');
        if (shouldBeLight && !isLight) document.documentElement.classList.add('light-mode');
        else if (!shouldBeLight && isLight) document.documentElement.classList.remove('light-mode');
      }
      syncTheme();
      window.addEventListener('pageshow', function(e) { if (e.persisted) syncTheme(); });
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       CSS VARIABLES — Dark Mode (default)
       ============================================ */
    :root {
      --bg-gradient: linear-gradient(180deg, #050c18, #0a1628 40%, #0d1f15);
      --overlay-1: #1a4a3a;
      --overlay-2: #0d2d40;
      --overlay-3: #1a2a0d;
      --pattern-line: rgba(212,175,55,0.02);
      --text-primary: #e8e8e8;
      --text-secondary: #c0c0c0;
      --text-tertiary: #a0a0a0;
      --text-muted: #808080;
      --gold: #d4af37;
      --gold-dark: #b8941f;
      --gold-hover: #f0cd5a;
      --green: #90c090;
      --error: #e88080;
      --card-bg: rgba(255,255,255,0.05);
      --card-border: rgba(212,175,55,0.2);
      --card-hover-bg: rgba(255,255,255,0.08);
      --card-active-bg: rgba(255,255,255,0.1);
      --star-opacity: 1;
      --gold-tint-08: rgba(212,175,55,0.08);
      --gold-tint-10: rgba(212,175,55,0.1);
      --gold-tint-15: rgba(212,175,55,0.15);
      --gold-tint-25: rgba(212,175,55,0.25);
      --gold-tint-30: rgba(212,175,55,0.3);
      --gold-tint-40: rgba(212,175,55,0.4);
      --gold-tint-50: rgba(212,175,55,0.5);
      --gold-tint-70: rgba(212,175,55,0.7);
      --toggle-bg: rgba(30,41,59,0.5);
      --toggle-border: rgba(100,116,139,0.3);
      --toggle-inactive: #94a3b8;
      --toggle-inactive-hover: #e2e8f0;
      --divider: rgba(255,255,255,0.08);
      --divider-subtle: rgba(255,255,255,0.05);
      --divider-footer: rgba(255,255,255,0.1);
      --table-row-hover: rgba(255,255,255,0.03);
      --today-row-bg: rgba(212,175,55,0.1);
      --gold-shadow: rgba(212,175,55,0.4);
      --gold-shadow-light: rgba(212,175,55,0.2);
      --gold-shadow-glow: rgba(212,175,55,0.3);
      --section-divider-border: rgba(212,175,55,0.2);
      --section-header-border: rgba(212,175,55,0.15);
      --table-header-border: rgba(212,175,55,0.3);
      --install-border: rgba(212,175,55,0.25);
      --card-shadow: rgba(0,0,0,0.4);
      --coming-soon-text: #606060;
    }

    /* ============================================
       CSS VARIABLES — Light Mode
       ============================================ */
    :root.light-mode {
      --bg-gradient: linear-gradient(180deg, #faf6ef, #f5eed9 40%, #f0ebe0);
      --overlay-1: #d4e8d0;
      --overlay-2: #cce0ec;
      --overlay-3: #e8e0c8;
      --pattern-line: rgba(180,140,30,0.04);
      --text-primary: #1a1a2e;
      --text-secondary: #3d3d50;
      --text-tertiary: #5a5a6e;
      --text-muted: #7a7a8a;
      --gold: #b8941f;
      --gold-dark: #9a7a10;
      --gold-hover: #d4af37;
      --green: #2d7a4f;
      --error: #c0392b;
      --card-bg: rgba(255,255,255,0.75);
      --card-border: rgba(180,140,30,0.2);
      --card-hover-bg: rgba(255,255,255,0.9);
      --card-active-bg: rgba(255,255,255,0.95);
      --star-opacity: 0;
      --gold-tint-08: rgba(180,140,30,0.08);
      --gold-tint-10: rgba(180,140,30,0.1);
      --gold-tint-15: rgba(180,140,30,0.15);
      --gold-tint-25: rgba(180,140,30,0.2);
      --gold-tint-30: rgba(180,140,30,0.25);
      --gold-tint-40: rgba(180,140,30,0.35);
      --gold-tint-50: rgba(180,140,30,0.4);
      --gold-tint-70: rgba(180,140,30,0.5);
      --toggle-bg: rgba(200,190,170,0.4);
      --toggle-border: rgba(160,140,100,0.3);
      --toggle-inactive: #7a7a8a;
      --toggle-inactive-hover: #3d3d50;
      --divider: rgba(0,0,0,0.08);
      --divider-subtle: rgba(0,0,0,0.05);
      --divider-footer: rgba(0,0,0,0.1);
      --table-row-hover: rgba(0,0,0,0.03);
      --today-row-bg: rgba(180,140,30,0.1);
      --gold-shadow: rgba(180,140,30,0.3);
      --gold-shadow-light: rgba(180,140,30,0.15);
      --gold-shadow-glow: rgba(180,140,30,0.2);
      --section-divider-border: rgba(180,140,30,0.2);
      --section-header-border: rgba(180,140,30,0.15);
      --table-header-border: rgba(180,140,30,0.3);
      --install-border: rgba(180,140,30,0.25);
      --card-shadow: rgba(0,0,0,0.15);
      --coming-soon-text: #9a9a9a;
      --nav-bg: #f4efe5;
      --month-header-bg: #f4efe5;
    }

    /* ============================================
       THEME TRANSITION
       ============================================ */
    .theme-transitioning,
    .theme-transitioning *,
    .theme-transitioning *::before,
    .theme-transitioning *::after {
      transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, opacity 0.4s ease !important;
    }

    /* ============================================
       BASE / RESET
       ============================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 16px 16px;
      padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px));
      position: relative;
      overflow-x: hidden;
    }

    /* Gradient overlays */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% -10%, var(--overlay-1), transparent 60%),
        radial-gradient(ellipse at 100% 50%, var(--overlay-2), transparent 50%),
        radial-gradient(ellipse at 0% 80%, var(--overlay-3), transparent 50%);
      z-index: 0;
      opacity: 0.5;
    }

    /* Islamic pattern */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(60deg, transparent, transparent 28px, var(--pattern-line) 28px, var(--pattern-line) 29px),
        repeating-linear-gradient(-60deg, transparent, transparent 28px, var(--pattern-line) 28px, var(--pattern-line) 29px);
      z-index: 1;
      pointer-events: none;
    }

    a { color: inherit; }

    /* ============================================
       BACKGROUND EFFECTS
       ============================================ */
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2; pointer-events: none;
      opacity: var(--star-opacity); transition: opacity 0.4s ease;
    }
    .star {
      position: absolute; width: 2px; height: 2px; background: white;
      border-radius: 50%; animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }

    .dust-motes {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2; pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
    }
    :root.light-mode .dust-motes { opacity: 1; }
    .mote {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, rgba(180,140,30,0.4), rgba(180,140,30,0) 70%);
      animation: drift 8s ease-in-out infinite;
    }
    @keyframes drift {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
      33% { transform: translateY(-12px) translateX(5px); opacity: 0.5; }
      66% { transform: translateY(-6px) translateX(-3px); opacity: 0.3; }
    }

    /* ============================================
       APP CONTAINER
       ============================================ */
    #app {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
      min-height: calc(100vh - 100px);
    }

    /* ============================================
       VIEW TRANSITIONS
       ============================================ */
    .view-transition {
      position: relative;
      overflow: hidden;
    }
    .view-pane {
      width: 100%;
    }
    .view-exit {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
    }

    @keyframes slideOutLeft { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30%); opacity: 0; } }
    @keyframes slideInRight { from { transform: translateX(30%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(30%); opacity: 0; } }
    @keyframes slideInLeft { from { transform: translateX(-30%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ============================================
       BOTTOM NAVIGATION BAR
       ============================================ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: var(--nav-bg, #182B31);
      border-top: 1px solid var(--card-border);
      z-index: 200;
    }
    .bottom-nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      max-width: 420px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
    }

    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 8px 0;
      flex: 1;
      text-decoration: none;
      color: var(--text-muted);
      transition: color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      min-height: 48px;
    }

    .nav-tab.active {
      color: var(--gold);
    }
    .nav-tab.active .nav-label { font-weight: 700; }

    .nav-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-icon svg {
      width: 22px;
      height: 22px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    /* Hide bottom nav on desktop */
    @media (min-width: 768px) {
      .bottom-nav { display: none; }
      body { padding-bottom: 16px; }
    }

    /* Desktop top navigation — hidden on mobile */
    .desktop-nav {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--card-border);
      z-index: 200;
      padding: 0 24px;
    }
    .desktop-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
    }
    .desktop-nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--gold);
      font-weight: 700;
      font-size: 1rem;
    }
    .desktop-nav-brand img {
      height: 28px;
      width: auto;
      object-fit: contain;
    }
    .desktop-nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .desktop-nav-link {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s;
      padding: 4px 0;
    }
    .desktop-nav-link:hover { color: var(--text-primary); }
    .desktop-nav-link.active { color: var(--gold); }
    @media (min-width: 768px) {
      .desktop-nav { display: block; }
      body { padding-top: 64px; }
    }

    /* ============================================
       SHARED COMPONENTS
       ============================================ */

    /* Headers */
    header { text-align: center; margin-bottom: 18px; }
    h1 {
      font-family: inherit;
      font-size: 1.5rem;
      color: var(--gold);
      margin-bottom: 6px;
      font-weight: 700;
      line-height: 1.2;
    }

    /* Cards */
    .card, .times-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 20px;
    }

    /* Gold divider */
    .gold-divider { display: flex; align-items: center; justify-content: center; margin: 16px 0; }
    .gold-divider .line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .gold-divider .diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); margin: 0 12px; }

    /* Buttons */
    .download-btn, .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border: none;
      color: #0a0a0a;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .download-btn:hover, .btn-primary:hover {
      background: linear-gradient(135deg, var(--gold-hover), var(--gold));
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--gold-shadow);
    }
    .download-btn:active, .btn-primary:active { transform: translateY(0); }

    .share-btn, .btn-secondary {
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }
    .share-btn:hover, .btn-secondary:hover {
      background: var(--gold-tint-15);
      transform: translateY(-2px);
    }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
    .btn-row .download-btn, .btn-row .btn-primary { margin-top: 0; }
    .btn-row .set-primary-btn { margin-top: 0; width: auto; }

    /* Footer */
    footer, .home-footer {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--divider-footer);
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Error */
    .error { text-align: center; padding: 60px 20px; font-size: 1.1rem; color: var(--error); }

    /* Skeleton loaders */
    @keyframes skeleton-pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .skeleton-bone { background: var(--divider); border-radius: 6px; animation: skeleton-pulse 1.5s ease-in-out infinite; }
    :root.light-mode .skeleton-bone { background: rgba(0,0,0,0.1); }
    .skeleton-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; padding: 12px 16px; margin-bottom: 20px; }
    .skeleton-header { text-align: center; margin-bottom: 16px; padding-top: 6px; }
    .skeleton-header .skeleton-bone:first-child { width: 60%; height: 1.6rem; margin: 0 auto 10px; }
    .skeleton-header .skeleton-bone:nth-child(2) { width: 40%; height: 0.85rem; margin: 0 auto 6px; }
    .skeleton-header .skeleton-bone:nth-child(3) { width: 30%; height: 0.75rem; margin: 0 auto; }
    .skeleton-toggle { display: flex; justify-content: center; margin-bottom: 16px; }
    .skeleton-toggle .skeleton-bone { width: 180px; height: 38px; border-radius: 10px; }
    .skeleton-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .skeleton-banner .skeleton-bone { height: 70px; border-radius: 10px; }
    .skeleton-divider { display: flex; align-items: center; margin: 16px 0; }
    .skeleton-divider .line { flex: 1; height: 1px; background: var(--divider); }
    .skeleton-divider .diamond { width: 8px; height: 8px; background: var(--divider); transform: rotate(45deg); margin: 0 12px; }
    .skeleton-section-title { width: 100px; height: 0.9rem; margin: 0 auto 12px; }
    .skeleton-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--divider); }
    .skeleton-row:last-child { border-bottom: none; }
    .skeleton-row .skeleton-bone:first-child { width: 60px; height: 0.85rem; }
    .skeleton-row .skeleton-bone:last-child { width: 45px; height: 0.95rem; }

    /* ============================================
       HOME VIEW
       ============================================ */
    .home-header { text-align: center; margin-bottom: 25px; }
    .home-header h1 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; margin: 0; line-height: 1; }
    .header-content { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; }
    .logo { height: 40px; width: auto; object-fit: contain; }

    /* Greeting */
    .greeting { text-align: left; margin-bottom: 20px; }
    .greeting-salaam { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); }
    .greeting-name { font-size: 1.5rem; font-weight: 600; color: var(--text-primary); line-height: 1.2; margin-top: 2px; }

    .grid-controls { display: flex; justify-content: flex-end; margin-bottom: 12px; }
    .location-btn {
      display: none; align-items: center; gap: 6px; padding: 7px 16px;
      border: 1px solid var(--card-border); border-radius: 20px;
      background: var(--card-bg); color: var(--text-secondary);
      font-size: 0.85rem; font-family: inherit; cursor: pointer;
      transition: all 0.3s ease;
    }
    .location-btn:hover { background: var(--card-hover-bg); border-color: var(--gold-tint-40); color: var(--gold); }
    .location-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-tint-08); }
    .location-btn.loading .location-icon { animation: spin 1s linear infinite; }
    .location-btn.error { border-color: #c0392b; color: #e74c3c; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .location-icon { width: 16px; height: 16px; flex-shrink: 0; }
    @media (max-width: 767px) { .location-btn { display: inline-flex; } }

    /* Hero card */
    .hero-card {
      position: relative; border: 1px solid var(--gold-tint-40);
      border-radius: 20px; overflow: hidden; margin-bottom: 28px;
      box-shadow: 0 0 30px var(--gold-shadow-light);
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      padding: 18px 20px 20px;
    }
    .hero-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .hero-badge {
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
    }
    .hero-badge-primary {
      background: var(--gold); color: #0a1210;
    }
    .hero-name { font-size: 1.3rem; color: var(--text-primary); font-weight: 700; line-height: 1.3; margin-bottom: 14px; }

    .hero-body {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .hero-next-prayer {
      background: var(--gold-tint-08); border-radius: 14px; padding: 14px;
      border: 1px solid var(--gold-tint-10); min-height: 80px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .hero-next-label {
      font-size: 0.6rem; color: var(--gold); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px;
    }
    .hero-next-time { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
    .hero-next-time .hero-next-ampm { font-size: 0.8rem; font-weight: 500; }
    .hero-next-detail { font-size: 0.6rem; color: var(--text-muted); font-weight: 500; }
    .hero-next-countdown { color: var(--text-muted); }
    .hero-next-skeleton {
      width: 100%; display: flex; flex-direction: column; gap: 8px;
    }
    .hero-next-skeleton .skeleton-bone { height: 14px; border-radius: 4px; background: var(--gold-tint-15); }
    .hero-next-skeleton .skeleton-bone:first-child { width: 60px; }
    .hero-next-skeleton .skeleton-bone:last-child { width: 80px; }
    .hero-card-link { display: block; text-decoration: none; color: inherit; transition: transform 0.2s, box-shadow 0.2s; }
    .hero-card-link:hover { transform: translateY(-2px); box-shadow: 0 4px 20px var(--gold-shadow-light); }
    .hero-unpin-btn {
      display: none; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      background: transparent; border: none;
      color: var(--gold); cursor: pointer;
      transition: background 0.2s;
    }
    @media (min-width: 768px) { .hero-unpin-btn { display: flex; } }
    .hero-unpin-btn:hover { background: var(--gold-tint-15); }
    .hero-unpin-btn svg { width: 16px; height: 16px; }

    /* Masjid scroll section */
    .masjid-scroll-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .masjid-scroll-title {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-muted); font-weight: 700;
    }

    /* Vertical list (default, no hero) */
    .masjid-grid {
      display: flex; flex-direction: column; gap: 12px; margin-top: 4px;
    }

    /* Horizontal scroll (when hero card is present) */
    .masjid-grid.horizontal {
      flex-direction: row; overflow-x: auto; gap: 14px;
      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
      padding-bottom: 12px;
    }
    .masjid-grid.horizontal::-webkit-scrollbar { display: none; }
    .masjid-grid.horizontal { -ms-overflow-style: none; scrollbar-width: none; }
    .masjid-grid.horizontal .masjid-card {
      min-width: 240px; max-width: 260px; flex-shrink: 0;
      scroll-snap-align: start;
    }

    .masjid-card {
      position: relative; background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 14px; transition: all 0.3s ease; cursor: pointer;
      text-decoration: none; color: inherit; display: flex; flex-direction: column;
      backdrop-filter: blur(12px);
      -webkit-tap-highlight-color: var(--gold-tint-10);
    }
    .masjid-card:hover { border-color: var(--gold-tint-40); }
    .masjid-card:active { background: var(--card-active-bg); transform: scale(0.98); }

    .masjid-card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
    .masjid-card-thumb {
      width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0;
      background: radial-gradient(circle at top right, #162a26, #0a1210);
      border: 1px solid var(--gold-tint-10);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold-tint-40);
    }
    .masjid-card-thumb svg { width: 18px; height: 18px; }
    :root.light-mode .masjid-card-thumb {
      background: radial-gradient(circle at top right, #e8dfc0, #f0ebe0);
      color: var(--gold-tint-50);
    }
    .masjid-card-info { min-width: 0; flex: 1; }
    .masjid-name { font-size: 0.85rem; color: var(--text-primary); font-weight: 700; text-align: left; line-height: 1.3; }
    .masjid-card-sub { font-size: 0.6rem; color: var(--text-muted); margin-top: 2px; }
    .addr-full { display: none; }
    @media (min-width: 768px) { .addr-short { display: none; } .addr-full { display: inline; } }

    .masjid-card-bottom {
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
      padding-top: 10px; border-top: 1px solid var(--divider-subtle);
    }
    .masjid-card-next { display: flex; flex-direction: column; }
    .masjid-card-next-label { font-size: 0.55rem; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .masjid-card-next-time { font-size: 0.85rem; font-weight: 700; color: var(--text-primary); min-width: 60px; }
    .masjid-card-chevron {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--gold-tint-08); border: 1px solid var(--gold-tint-10);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); border-radius: 10px;
    }
    .masjid-card-chevron svg { width: 16px; height: 16px; }

    /* Vertical list card: single-row layout */
    .masjid-grid:not(.horizontal) .masjid-card {
      flex-direction: row; align-items: center; gap: 12px; padding: 12px 14px;
    }
    .masjid-grid:not(.horizontal) .masjid-card-top { margin-bottom: 0; flex: 1; align-items: center; }
    .masjid-grid:not(.horizontal) .masjid-card-bottom {
      border-top: none; padding-top: 0; gap: 10px; flex-shrink: 0;
    }

    /* Pin button — desktop only, inline next to name */
    .pin-btn {
      display: none; width: 20px; height: 20px; flex-shrink: 0; margin-left: 6px;
      border: none; background: transparent; cursor: pointer; padding: 0;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s ease;
    }
    .pin-btn svg { width: 14px; height: 14px; color: var(--text-muted); transition: color 0.2s ease; }
    @media (min-width: 768px) {
      .pin-btn { display: inline-flex; position: relative; top: -2px; }
      .masjid-card:hover .pin-btn { opacity: 0.6; }
    }
    .pin-btn:hover { opacity: 1 !important; }
    .pin-btn:hover svg { color: var(--gold); }
    .pin-btn.pinned { opacity: 1; }
    .pin-btn.pinned svg { color: var(--gold); }
    .masjid-name-row { display: flex; align-items: center; }

    /* Long-press visual feedback (mobile) */
    .masjid-card.long-pressing { transform: scale(0.97); transition: transform 0.3s ease; }

    /* Pin toast */
    .pin-toast {
      position: fixed; bottom: calc(72px + env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--card-bg); border: 1px solid var(--gold-tint-40);
      backdrop-filter: blur(12px); color: var(--text-primary);
      padding: 10px 20px; border-radius: 12px; font-size: 0.8rem; font-weight: 500;
      z-index: 300; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
    }
    .pin-toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .pin-toast .toast-star { color: var(--gold); margin-right: 6px; }

    /* Set as primary button (prayer times page) */
    .set-primary-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 10px; margin-top: 8px;
      background: transparent; border: 1px solid var(--gold-tint-30);
      color: var(--gold); font-size: 0.85rem; font-weight: 600;
      border-radius: 8px; cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .set-primary-btn:hover { background: var(--gold-tint-08); }
    .set-primary-btn svg { width: 16px; height: 16px; }
    .set-primary-btn.is-primary { border-color: var(--gold); background: var(--gold-tint-08); }

    .distance-badge { font-size: 0.6rem; color: var(--text-muted); white-space: nowrap; }

    /* No hero state */
    .home-no-hero {
      text-align: center; padding: 32px 20px; margin-bottom: 20px;
      background: var(--card-bg); border: 1px dashed var(--card-border); border-radius: 16px;
    }
    .home-no-hero-icon { color: var(--gold-tint-30); margin-bottom: 12px; }
    .home-no-hero-icon svg { width: 40px; height: 40px; }
    .home-no-hero-text { font-size: 0.95rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .home-no-hero-sub { font-size: 0.8rem; color: var(--text-muted); }
    .home-no-hero-sub a { color: var(--gold); text-decoration: none; font-weight: 600; }

    /* Sehri/Iftari suggestion card (no pinned masjid) */
    .sehri-iftari-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 16px; backdrop-filter: blur(12px);
      margin-bottom: 16px;
    }
    .sehri-iftari-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .sehri-iftari-badge {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--gold);
      background: var(--gold-tint-08); border: 1px solid var(--gold-tint-20);
      padding: 3px 10px; border-radius: 999px;
    }
    .sehri-iftari-source {
      font-size: 0.7rem; color: var(--text-muted); font-weight: 500;
    }
    .sehri-iftari-body {
      display: flex; align-items: center; justify-content: center;
    }
    .sehri-iftari-loading {
      display: flex; gap: 40px; padding: 12px 0;
    }
    .sehri-iftari-item {
      flex: 1; text-align: center; padding: 8px 0;
    }
    .sehri-iftari-divider {
      width: 1px; height: 48px; background: var(--divider-subtle); flex-shrink: 0;
    }
    .sehri-iftari-label {
      font-size: 0.65rem; color: var(--text-muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px;
    }
    .sehri-iftari-time {
      font-size: 1.3rem; font-weight: 700; color: var(--text-primary); line-height: 1.2;
    }
    .sehri-iftari-countdown {
      font-size: 0.7rem; color: var(--green); margin-top: 2px;
    }
    .sehri-iftari-empty {
      font-size: 0.85rem; color: var(--text-muted); padding: 12px 0; text-align: center;
    }
    .sehri-iftari-cta {
      display: block; text-align: center; margin-top: 14px; padding: 10px;
      font-size: 0.8rem; font-weight: 600; color: var(--gold);
      background: var(--gold-tint-08); border: 1px solid var(--gold-tint-20);
      border-radius: 10px; text-decoration: none; transition: all 0.2s;
    }
    .sehri-iftari-cta:hover { background: var(--gold-tint-15); }
    .sehri-iftari-cta-desktop {
      display: none; text-align: center; margin-top: 14px; padding: 10px;
      font-size: 0.8rem; font-weight: 500; color: var(--text-muted);
    }
    @media (min-width: 768px) {
      .sehri-iftari-cta-mobile { display: none; }
      .sehri-iftari-cta-desktop { display: block; }
    }

    /* Recently viewed section */
    .recent-section { margin-bottom: 12px; }
    .recent-list { display: flex; flex-direction: column; gap: 8px; }
    .recent-card {
      display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 12px; text-decoration: none; color: inherit;
      transition: all 0.2s ease; cursor: pointer;
      -webkit-tap-highlight-color: var(--gold-tint-10);
    }
    .recent-card:hover { border-color: var(--gold-tint-40); background: var(--card-hover-bg); }
    .recent-card:active { background: var(--card-active-bg); transform: scale(0.98); }
    .recent-card-thumb {
      width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0;
      background: radial-gradient(circle at top right, #162a26, #0a1210);
      border: 1px solid var(--gold-tint-10);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold-tint-40);
    }
    :root.light-mode .recent-card-thumb {
      background: radial-gradient(circle at top right, #e8dfc0, #f0ebe0);
      color: var(--gold-tint-50);
    }
    .recent-card-thumb svg { width: 18px; height: 18px; }
    .recent-card-info { flex: 1; min-width: 0; }
    .recent-card-info .masjid-name { font-size: 0.8rem; }
    .recent-card-info .masjid-card-sub { font-size: 0.6rem; }
    .recent-card-next { display: flex; flex-direction: column; flex-shrink: 0; text-align: right; }

    /* Browse all masjids button */
    .home-browse-all { margin-bottom: 24px; }
    .home-browse-btn {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 14px 16px; background: var(--gold-tint-08);
      border: 1px solid var(--gold-tint-10); border-radius: 14px;
      text-decoration: none; color: var(--gold); font-size: 0.85rem; font-weight: 600;
      transition: all 0.2s ease;
    }
    .home-browse-btn:hover { background: var(--gold-tint-15); border-color: var(--gold-tint-25); }
    .home-browse-btn svg:first-child { width: 22px; height: 22px; flex-shrink: 0; }
    .home-browse-btn span { flex: 1; }
    .home-browse-btn svg:last-child { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.6; }

    /* ============================================
       MASJIDS VIEW
       ============================================ */
    .masjids-view { padding-bottom: 40px; }
    .masjids-header { margin-bottom: 16px; }
    .masjids-header h1 { font-size: 1.3rem; color: var(--gold); font-weight: 600; margin: 0; }
    .masjids-search-bar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
      padding: 6px 6px 6px 14px; background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 12px; transition: border-color 0.2s;
    }
    .masjids-search-bar:focus-within { border-color: var(--gold-tint-50); }
    .masjids-search-icon { flex-shrink: 0; color: var(--text-muted); }
    .masjids-search-icon svg { width: 18px; height: 18px; }
    .masjids-search-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text-primary); font-size: 0.85rem; font-family: inherit;
    }
    .masjids-search-input::placeholder { color: var(--text-muted); }
    .masjids-search-bar .location-btn { flex-shrink: 0; margin: 0; }
    .pin-hint {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 12px; margin-bottom: 12px;
      background: var(--gold-tint-08); border: 1px solid var(--gold-tint-15);
      border-radius: 8px; font-size: 0.75rem; color: var(--gold-tint-70);
    }
    .pin-hint-dismiss {
      background: none; border: none; color: var(--gold-tint-50); cursor: pointer;
      font-size: 1rem; padding: 0 2px; line-height: 1; flex-shrink: 0;
    }
    .masjids-empty {
      text-align: center; padding: 40px 20px; color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* CTA */
    .cta-section {
      text-align: center; margin: 16px auto; max-width: 600px; padding: 28px 24px;
      background: var(--gold-tint-08); border: 1px solid var(--card-border); border-radius: 12px;
    }
    .cta-heading { font-size: 1.35rem; color: var(--gold); font-weight: 600; margin: 0 0 16px; }
    .cta-btn {
      display: inline-block; padding: 10px 28px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #1a1a2e; font-size: 0.9rem; font-weight: 700; text-decoration: none;
      border-radius: 8px; letter-spacing: 0.5px; transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(212,175,55,0.3); }
    @media (min-width: 768px) { .cta-section { display: none; } }

    /* ============================================
       PRAYER TIMES VIEW
       ============================================ */
    .prayer-times-view header { position: relative; }
    .share-icon-btn {
      position: absolute; top: 0; right: 0;
      background: none; border: none; cursor: pointer; padding: 6px;
      color: var(--text-muted); transition: color 0.2s;
    }
    .share-icon-btn:hover { color: var(--gold); }
    .share-icon-btn svg { width: 20px; height: 20px; }
    .date-line { font-size: 0.85rem; color: var(--text-tertiary); margin-bottom: 4px; }
    .hijri-line { font-family: 'Amiri', serif; font-size: 0.95rem; color: var(--green); margin-bottom: 10px; }

    /* Toggle */
    .view-toggle { display: flex; justify-content: center; margin-bottom: 16px; max-width: 400px; margin-left: auto; margin-right: auto; }
    .toggle-container { position: relative; display: flex; padding: 4px; background: var(--toggle-bg); backdrop-filter: blur(8px); border-radius: 10px; border: 1px solid var(--toggle-border); width: 100%; }
    .toggle-slider { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 8px; transition: transform 0.3s ease; box-shadow: 0 2px 8px var(--gold-shadow-glow); }
    .toggle-slider.monthly { transform: translateX(100%); }
    .toggle-btn { position: relative; flex: 1; padding: 10px 20px; font-size: 0.85rem; font-weight: 500; color: var(--toggle-inactive); background: transparent; border: none; cursor: pointer; transition: color 0.3s ease; z-index: 1; text-align: center; }
    .toggle-btn.active { color: #0a0a0a; font-weight: 700; }
    .toggle-btn:hover:not(.active) { color: var(--toggle-inactive-hover); }

    /* Banner */
    .section-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; align-items: stretch; }
    .banner-item { background: var(--gold-tint-08); border: 1px solid var(--gold-tint-10); border-radius: 14px; padding: 12px 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
    .banner-label { font-family: 'Lato', sans-serif; font-size: 0.75rem; color: var(--text-tertiary); margin-bottom: 6px; font-weight: 400; }
    .banner-time { font-size: 1.35rem; color: var(--gold); font-weight: 700; }
    .banner-item.next-prayer { background: linear-gradient(135deg, var(--gold-tint-25), var(--gold-tint-15)); border-color: var(--gold-tint-50); }

    /* Flip card */
    .flip-card { perspective: 600px; cursor: pointer; display: flex; }
    .flip-card-inner { position: relative; transition: transform 0.5s ease; transform-style: preserve-3d; flex: 1; }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back { backface-visibility: hidden; -webkit-backface-visibility: hidden; position: relative; min-height: 100%; }
    .flip-card-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotateY(180deg); }
    .flip-hint { position: absolute; top: 6px; right: 8px; font-size: 0.65rem; color: var(--gold-tint-50); line-height: 1; }

    /* Times table — 3-column layout */
    .times-table-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 16px; overflow: hidden; margin-bottom: 16px;
      backdrop-filter: blur(12px);
    }
    .times-table-header {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      padding: 10px 16px; border-bottom: 1px solid var(--divider);
    }
    .times-table-header .time-col {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted); font-weight: 700; text-align: center;
    }
    .times-table-header .time-col:first-child { text-align: left; }
    .times-table-header .time-col:last-child { text-align: right; }
    .times-table-body { padding: 0; }
    .time-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      padding: 12px 16px; border-bottom: 1px solid var(--divider-subtle);
      align-items: center; transition: background 0.2s;
    }
    .time-row:last-child { border-bottom: none; }
    .time-col { text-align: center; }
    .time-start {
      font-size: 0.95rem; color: var(--text-secondary);
      font-weight: 500; text-align: left;
    }
    .time-name {
      font-size: 0.85rem; color: var(--text-primary); font-weight: 600;
      position: relative;
    }
    .time-jamaat {
      font-size: 0.95rem; color: var(--gold);
      font-weight: 600; text-align: right;
    }
    .time-row.next-start .time-start,
    .time-row.next-jamaat .time-jamaat { color: var(--gold); }
    .time-row.next-start, .time-row.next-jamaat {
      background: var(--gold-tint-08);
    }
    .time-row .countdown {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 0.55rem; color: var(--green); font-weight: 400;
      white-space: nowrap;
    }
    .time-row .countdown-left { left: -5px; transform: translateY(-50%) translateX(-100%); }
    .time-row .countdown-right { right: -5px; transform: translateY(-50%) translateX(100%); }
    .section-title { font-size: 1rem; color: var(--gold); margin-bottom: 12px; text-align: center; font-weight: 600; }
    .countdown { font-family: 'Lato', sans-serif; font-size: 0.7rem; color: var(--green); font-weight: 400; margin-left: 6px; }
    @media (max-width: 767px) {
      .banner-label .countdown { display: block; margin-left: 0; }
      .banner-label { min-height: 2.4em; display: flex; flex-direction: column; justify-content: center; }
    }

    /* Month mode sub-toggle */
    .month-mode-toggle {
      display: flex; justify-content: center; gap: 0; margin-bottom: 12px;
      background: var(--toggle-bg); border-radius: 8px; border: 1px solid var(--toggle-border);
      padding: 3px; max-width: 200px; margin-left: auto; margin-right: auto;
    }
    .month-mode-btn {
      flex: 1; padding: 6px 12px; font-size: 0.75rem; font-weight: 500;
      color: var(--toggle-inactive); background: transparent; border: none;
      cursor: pointer; border-radius: 6px; transition: all 0.2s;
      font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .month-mode-btn.active {
      background: var(--gold-tint-15); color: var(--gold); font-weight: 700;
    }

    /* Monthly table */
    .month-table-card { overflow-y: auto; max-height: 70vh; }
    .month-table {
      width: 100%; border-collapse: collapse; font-size: 0.8rem;
      table-layout: fixed;
    }
    .month-table thead th {
      padding: 10px 4px; text-align: center; font-size: 0.6rem;
      text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;
      color: var(--text-muted); border-bottom: 1px solid var(--divider);
      position: sticky; top: 0; background: var(--month-header-bg, #182B31); z-index: 1;
    }
    .month-table thead th.date-col { text-align: left; padding-left: 12px; }
    .month-table tbody td {
      padding: 10px 4px; text-align: center;
      border-bottom: 1px solid var(--divider-subtle); color: var(--text-secondary);
      font-size: 0.8rem; white-space: nowrap;
    }
    .month-table tbody td.date-col { text-align: left; padding-left: 12px; color: var(--text-muted); font-weight: 500; font-size: 0.75rem; line-height: 1.3; }
    .month-hijri { display: block; font-size: 0.6rem; color: var(--text-muted); font-weight: 400; opacity: 0.7; }
    .month-table tbody tr:last-child td { border-bottom: none; }
    .month-table tbody tr.today { background: var(--gold-tint-08); }
    .month-table tbody tr.today td { color: var(--gold); font-weight: 600; }
    .next-prayer-cell { color: var(--green) !important; }
    .month-table-card { scrollbar-width: thin; scrollbar-color: var(--gold-tint-30) transparent; }

    .month-table-card::-webkit-scrollbar-thumb:hover { background: var(--gold-tint-50); }
    .month-group-header { font-size: 0.65rem; color: var(--gold); border-bottom: 2px solid var(--gold-tint-30); letter-spacing: 1px; top: 0; }

    .hijri-col { font-size: 0.7rem; color: var(--text-muted); text-align: center; white-space: nowrap; }
    @media (min-width: 768px) {

      .month-table-combined .hijri-col { width: 70px; text-align: center; padding-left: 4px; }

    }

    /* Info section */
    .info-section { border: 1px solid var(--card-border); border-radius: 16px; background: var(--card-bg); backdrop-filter: blur(12px); margin-bottom: 20px; overflow: hidden; }
    .info-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; font-size: 0.95rem; color: var(--text-secondary); font-weight: 500; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
    @media (hover: hover) { .info-header:hover { background: var(--gold-tint-08); } }
    .chevron { width: 8px; height: 8px; border-right: 2px solid var(--text-muted); border-bottom: 2px solid var(--text-muted); transform: rotate(45deg); transition: transform 0.3s; }
    .info-header.expanded .chevron { transform: rotate(-135deg); }
    .info-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .info-body-inner { padding: 8px 16px 16px; }

    .info-layout { display: flex; flex-direction: column; }
    @media (min-width: 768px) {
      .info-layout { flex-direction: row; gap: 24px; }
      .info-layout-left { flex: 0 0 auto; min-width: 220px; display: flex; flex-direction: column; justify-content: space-between; }
      .info-layout-left .info-maps-btn { margin-top: auto; min-height: 48px; box-sizing: border-box; }
      .info-fitrana { min-height: 48px; box-sizing: border-box; }
      .info-layout-right { flex: 1; min-width: 0; }
      .info-layout-right .info-grid { border-top: none; padding-top: 0; }
      .info-location { margin-bottom: 12px; }
    }
    .info-location { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .info-location-icon {
      background: var(--gold-tint-15); padding: 8px; border-radius: 10px;
      color: var(--gold); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .info-location-text { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; }
    .info-field-label {
      font-size: 0.6rem; color: var(--gold); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px;
    }
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px 12px;
      border-top: 1px solid var(--gold-tint-10); padding-top: 16px; margin-top: 16px;
    }
    .info-grid-item { min-width: 0; }
    .info-grid-full { grid-column: 1 / -1; }
    .info-field-value { font-size: 0.85rem; color: var(--text-secondary); }
    .info-field-value a { color: var(--gold); text-decoration: none; }
    .info-field-value a:hover { text-decoration: underline; }
    .info-field-bold { font-weight: 600; }
    .info-fitrana {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--gold-tint-08); padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--gold-tint-10);
    }
    .info-fitrana .info-field-label { margin-bottom: 0; }
    .info-fitrana .info-field-value { font-size: 0.95rem; color: var(--text-primary); }
    .info-maps-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 10px 12px; margin-top: 16px; border-radius: 10px;
      background: var(--gold-tint-08); border: 1px solid var(--gold-tint-10);
      color: var(--text-secondary); font-size: 0.85rem; font-weight: 500;
      text-decoration: none; transition: background 0.2s;
    }
    .info-maps-btn:hover { background: var(--gold-tint-15); }

    /* Lockscreen section (prayer times layout) */
    .lockscreen-section { margin: 12px 0; }

    /* Mobile line break helper */
    .mobile-br { display: none; }
    @media (max-width: 767px) { .mobile-br { display: inline; } }

    /* Stale notice */
    .stale-notice { text-align: center; padding: 40px 20px; }
    .stale-notice h2 { color: var(--gold); font-size: 1.3rem; margin-bottom: 12px; }
    .stale-notice p { color: var(--text-tertiary); font-size: 0.95rem; line-height: 1.5; }

    /* Install banner */
    .install-banner {
      background: var(--gold-tint-08); border: 1px solid var(--install-border);
      border-radius: 10px; padding: 14px 16px; margin-top: 14px;
      display: none; position: relative;
    }
    .install-banner.has-button { padding-bottom: 48px; }
    .install-banner.visible { display: block; }
    .install-banner-text { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; padding-right: 24px; }
    .install-banner-text strong { color: var(--gold); }
    .install-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border: none;
      color: #0a0a0a; padding: 8px 18px; border-radius: 8px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.3s ease;
      position: absolute; bottom: 14px; right: 16px;
    }
    .install-btn:hover { background: linear-gradient(135deg, var(--gold-hover), var(--gold)); }
    .install-dismiss {
      background: none; border: none; color: var(--text-muted); font-size: 1.2rem;
      cursor: pointer; padding: 0; line-height: 1; position: absolute; top: 12px; right: 14px;
    }
    .install-dismiss:hover { color: var(--text-secondary); }

    /* ============================================
       QIBLA VIEW
       ============================================ */
    .qibla-view {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      min-height: 70vh; padding: 20px 0;
      overflow: hidden; touch-action: pan-y;
    }
    .qibla-desktop-msg { padding: 60px 20px; color: var(--text-tertiary); }
    .qibla-desktop-msg p { font-size: 1.1rem; margin-bottom: 8px; }
    .qibla-desktop-sub { font-size: 0.9rem; }

    /* Bearing display */
    .qibla-bearing-display { margin-bottom: 24px; }
    .qibla-bearing-value {
      font-size: 3rem; font-weight: 700; color: var(--text-primary);
      letter-spacing: -1px; line-height: 1.1; margin-bottom: 8px;
    }
    .qibla-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 14px; border-radius: 999px;
      background: var(--gold-tint-08); border: 1px solid var(--gold-tint-30);
      color: var(--gold); font-size: 0.8rem; font-weight: 500;
      transition: all 0.3s;
    }
    .qibla-badge-aligned {
      background: rgba(45, 122, 79, 0.15); border-color: rgba(45, 122, 79, 0.3);
      color: var(--green);
    }
    .qibla-badge-error {
      background: rgba(192, 57, 43, 0.1); border-color: rgba(192, 57, 43, 0.2);
      color: var(--error);
    }

    /* Compass */
    .compass-container {
      position: relative; width: 280px; height: 280px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto;
    }
    .compass-outer-ring {
      position: absolute; inset: -16px; border-radius: 50%;
      border: 1px solid var(--gold-tint-15);
    }
    .compass-inner-ring {
      position: absolute; inset: -8px; border-radius: 50%;
      border: 1px solid var(--gold-tint-25);
    }
    .compass {
      width: 100%; height: 100%; position: relative;
      border-radius: 50%; transition: transform 0.15s ease-out;
      border: 3px solid var(--gold);
      background: var(--card-bg); backdrop-filter: blur(8px);
    }
    .compass-container.on-qibla .compass {
      box-shadow: 0 0 40px var(--gold-shadow), 0 0 80px var(--gold-shadow-light);
    }

    .compass-dir {
      position: absolute; font-size: 0.85rem;
      font-weight: 600; color: var(--text-muted); opacity: 0.5;
    }
    .compass-n { top: 12px; left: 50%; transform: translateX(-50%); color: var(--gold); opacity: 1; }
    .compass-e { right: 12px; top: 50%; transform: translateY(-50%); }
    .compass-s { bottom: 12px; left: 50%; transform: translateX(-50%); }
    .compass-w { left: 12px; top: 50%; transform: translateY(-50%); }

    /* Needle */
    .qibla-needle {
      position: absolute; top: 0; left: 50%;
      width: 0; height: 50%;
      transform-origin: bottom center;
      margin-left: 0;
    }
    .needle-line {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 3px; height: 70%; border-radius: 2px;
      background: linear-gradient(to top, transparent, var(--gold));
      box-shadow: 0 0 12px rgba(212,175,55,0.6);
    }
    .needle-icon {
      position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
      color: var(--gold); width: 28px; height: 28px;
    }
    .needle-icon svg { width: 100%; height: 100%; }

    /* Center dot */
    .compass-center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px rgba(212,175,55,0.4);
      border: 2px solid var(--card-bg);
      z-index: 2;
    }

    /* Actions */
    .qibla-actions { margin-top: 32px; width: 100%; max-width: 280px; }
    .qibla-enable-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border: none; color: #0a0a0a; padding: 14px 24px; border-radius: 12px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
      box-shadow: 0 4px 15px var(--gold-shadow);
    }
    .qibla-enable-btn:hover { transform: translateY(-1px); }
    .qibla-enable-btn:active { transform: scale(0.97); }
    .qibla-enable-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
    .qibla-location {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 16px; padding: 12px; border-radius: 12px;
      background: var(--gold-tint-08); border: 1px solid var(--gold-tint-10);
      color: var(--text-muted); font-size: 0.8rem;
    }
    .qibla-permission { margin-bottom: 12px; }

    /* ============================================
       SETTINGS VIEW
       ============================================ */
    .settings-view { max-width: 500px; margin: 0 auto; }
    .settings-header { margin-bottom: 24px; }

    .settings-group {
      margin-bottom: 24px;
    }
    .settings-group-title {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-muted); margin-bottom: 8px; padding-left: 4px;
    }
    .settings-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; background: var(--card-bg);
      border: 1px solid var(--card-border); border-radius: 12px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      margin-bottom: 4px; text-decoration: none; color: inherit;
      transition: background 0.2s;
    }
    .settings-item:last-of-type { margin-bottom: 0; }
    .settings-link:hover { background: var(--card-hover-bg); }

    .settings-item-left { display: flex; align-items: center; gap: 12px; }
    .settings-icon { display: flex; color: var(--gold); }
    .settings-label { font-size: 0.95rem; color: var(--text-primary); }
    .settings-value { font-size: 0.85rem; color: var(--text-muted); }
    .settings-input { background: transparent; border: 1px solid var(--divider); border-radius: 8px; padding: 6px 10px; font-size: 0.85rem; color: var(--text-primary); font-family: inherit; width: 140px; text-align: left; }
    .settings-input:focus { outline: none; border-color: var(--gold); }
    .settings-chevron { color: var(--text-muted); display: flex; }
    .settings-pinned-right { display: flex; align-items: center; gap: 8px; }
    .settings-remove-btn {
      display: flex; align-items: center; justify-content: center;
      background: none; border: 1px solid var(--divider); border-radius: 6px;
      color: var(--text-muted); cursor: pointer; padding: 4px;
      transition: all 0.2s;
    }
    .settings-remove-btn:hover { color: var(--error); border-color: var(--error); }

    .settings-reset-btn {
      background: none; border: 1px solid var(--divider); border-radius: 8px;
      color: var(--text-muted); cursor: pointer; padding: 4px 12px;
      font-size: 0.7rem; font-weight: 600; transition: all 0.2s;
    }
    .settings-reset-btn:hover { color: var(--error); border-color: var(--error); }
    .settings-reset-confirm { background: var(--error); color: #fff; border-color: var(--error); }
    .settings-reset-confirm:hover { background: var(--error); color: #fff; }

    /* Toggle switch */
    .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; cursor: pointer; inset: 0;
      background: var(--divider); border-radius: 24px;
      transition: background 0.3s;
    }
    .toggle-track::after {
      content: ''; position: absolute; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background: white; border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--gold); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(20px); }

    /* ============================================
       ADD MASJID VIEW
       ============================================ */
    .add-masjid-view { max-width: 700px; margin: 0 auto; }
    @media (min-width: 768px) {
      .add-masjid-view { max-width: none; }
      .add-masjid-view #step3 .card {
        position: relative;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100vw - 80px);
        padding: 16px 24px;
      }
    }
    .add-subtitle { font-size: 0.9rem; color: var(--text-tertiary); margin-bottom: 8px; line-height: 1.4; }

    .progress-bar { display: flex; align-items: flex-start; justify-content: center; margin: 20px 0; gap: 0; }
    .progress-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .step-number { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; transition: all 0.3s; }
    .step-label { font-size: 0.7rem; color: var(--text-muted); display: none; }
    .progress-step.active .step-number { border-color: var(--gold); color: var(--gold); background: var(--gold-tint-15); }
    .progress-step.active .step-label { color: var(--gold); }
    .progress-step.done .step-number { border-color: var(--gold); background: var(--gold); color: #0a0a0a; }
    .progress-connector { width: 30px; height: 2px; background: var(--text-muted); margin: 0 4px; margin-top: 14px; transition: background 0.3s; }
    .progress-connector.done { background: var(--gold); }
    @media (min-width: 768px) { .step-label { display: block; } .progress-connector { width: 50px; } }

    .step-panel { display: none; }
    .step-panel.active { display: block; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 10px 12px; font-size: 0.9rem; font-family: inherit;
      background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--card-border);
      border-radius: 8px; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); }
    .required { color: var(--error); }

    .upload-area {
      border: 2px dashed var(--card-border); border-radius: 12px; padding: 30px 20px;
      text-align: center; cursor: pointer; transition: all 0.3s;
    }
    .upload-area:hover, .upload-area.dragover { border-color: var(--gold); background: var(--gold-tint-08); }
    .upload-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .upload-text { color: var(--text-primary); margin-bottom: 4px; }
    .upload-hint { font-size: 0.8rem; color: var(--text-muted); }
    .upload-tip { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; line-height: 1.4; }
    .upload-input { display: none; }

    .image-preview { display: none; text-align: center; }
    .image-preview.visible { display: block; }
    .image-preview img { max-width: 100%; max-height: 400px; border-radius: 8px; margin-bottom: 8px; }
    @media (min-width: 768px) { .image-preview img { max-height: 600px; } }
    .file-info { font-size: 0.8rem; color: var(--text-muted); }
    .change-btn { color: var(--gold); font-size: 0.85rem; cursor: pointer; text-decoration: underline; }

    .add-masjid-view .btn-row:has(.btn-primary:only-child) { grid-template-columns: 1fr; max-width: 260px; margin-left: auto; margin-right: auto; }
    .review-btn-row { grid-template-columns: 1fr 1fr; }
    .review-btn-row .btn-primary { grid-column: 1 / -1; }
    @media (min-width: 768px) { .review-btn-row { grid-template-columns: 1fr 1fr 1fr; } .review-btn-row .btn-primary { grid-column: auto; } }
    .error-msg { font-size: 0.85rem; color: var(--error); margin-top: 12px; display: none; background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.25); border-radius: 8px; padding: 10px 14px; text-align: center; }
    .error-msg.visible { display: block; }

    .status-msg { text-align: center; padding: 40px 20px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--divider); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }

    .section-label { font-size: 0.95rem; color: var(--gold); font-weight: 600; margin: 16px 0 12px; }

    .review-layout { margin-bottom: 16px; }
    .review-image { overflow: auto; max-height: 500px; border-radius: 8px; border: 1px solid var(--card-border); }
    .review-image img { width: 100%; display: block; cursor: pointer; }
    .zoom-hint { font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 4px; }
    .zoom-hint-desktop { display: none; }
    @media (min-width: 768px) { .zoom-hint-mobile { display: none; } .zoom-hint-desktop { display: inline; } }
    .zoom-controls { display: none; justify-content: center; gap: 8px; margin-top: 6px; align-items: center; }
    .zoom-btn { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-primary); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
    .zoom-level { font-size: 0.75rem; color: var(--text-muted); min-width: 28px; text-align: center; }
    @media (min-width: 768px) {
      .review-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
      .review-image-wrap { position: sticky; top: 16px; }
      .review-image { max-height: none; }
      .zoom-controls { display: flex; }
    }

    .review-table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    @media (min-width: 768px) { .review-table { width: 100%; } }
    .review-table th { color: var(--gold); font-weight: 600; padding: 6px 6px; text-align: center; border-bottom: 2px solid var(--table-header-border); font-size: 0.75rem; white-space: nowrap; position: sticky; top: 0; background: var(--card-bg-solid, #182B31); z-index: 2; }
    :root.light-mode .review-table th { background: var(--card-bg-solid, #f4efe5); }
    .review-table td { padding: 3px 2px; text-align: center; border-bottom: 1px solid var(--divider-subtle); }
    .review-table input { width: 100%; min-width: 48px; padding: 5px 3px; font-size: 0.85rem; font-family: inherit; background: transparent; color: var(--text-primary); border: 1px solid transparent; border-radius: 4px; text-align: center; }
    .review-table input:focus { outline: none; border-color: var(--gold); background: var(--gold-tint-08); }
    .row-num { font-size: 0.7rem; color: var(--text-muted); }
    .review-table-wrap { overflow: auto; max-height: 50vh; }
    @media (min-width: 768px) { .review-table-wrap { max-height: none; overflow-x: auto; overflow-y: visible; } }

    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (min-width: 768px) { .meta-grid { grid-template-columns: 1fr 1fr 1fr; } }

    .confirmation { text-align: center; padding: 40px 20px; }
    .check-icon { width: 60px; height: 60px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .check-icon svg { width: 32px; height: 32px; color: white; }
    .confirmation-note { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; }
    .masjid-link { display: inline-flex; align-items: center; gap: 6px; color: var(--gold); text-decoration: none; font-weight: 600; margin-top: 16px; font-size: 1.1rem; }
    .masjid-link:hover { text-decoration: underline; }

    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; }
    .lightbox-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; z-index: 1001; }

    /* ============================================
       404 VIEW
       ============================================ */
    .not-found { text-align: center; padding: 80px 20px; }
    .not-found-code { font-size: 4rem; font-weight: 700; color: var(--gold); line-height: 1; margin-bottom: 12px; }
    .not-found-message { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
    .not-found-link { display: inline-block; padding: 10px 28px; border: 1px solid var(--gold); border-radius: 20px; color: var(--gold); text-decoration: none; font-size: 0.95rem; transition: all 0.3s ease; }
    .not-found-link:hover { background: rgba(212,175,55,0.1); }

    /* ============================================
       DESKTOP RESPONSIVE
       ============================================ */
    /* Desktop masjid list embedded in home */
    .desktop-masjid-list { display: none; }

    @media (min-width: 768px) {
      body { padding: 50px 30px; }
      #app { padding-top: 40px; }
      .home-header { display: none; }
      .masjid-grid, .masjid-grid.horizontal {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 12px;
        overflow-x: visible; flex-direction: unset; scroll-snap-type: none; padding-bottom: 0;
      }
      .masjid-grid .masjid-card, .masjid-grid.horizontal .masjid-card {
        min-width: 0; max-width: none; flex-shrink: 1;
        flex-direction: row; align-items: center; gap: 12px; padding: 14px 16px;
      }
      .masjid-grid .masjid-card-top { margin-bottom: 0; flex: 1; align-items: center; }
      .masjid-grid .masjid-card-bottom { border-top: none; padding-top: 0; gap: 10px; flex-shrink: 0; }
      .masjid-card:hover { background: var(--card-hover-bg); border-color: var(--gold-tint-40); transform: translateY(-3px); box-shadow: 0 10px 25px var(--card-shadow); }
      .hero-card { max-width: 600px; }
      .home-browse-btn { display: none; }
      .pin-hint { display: none; }
      .recent-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .masjids-header h1 { font-size: 1.5rem; }

      /* Show embedded masjid list on desktop home */
      .desktop-masjid-list { display: block; margin-top: 24px; }
      .desktop-masjid-list .masjids-view { padding-bottom: 0; }
      .desktop-masjid-list .masjids-header { display: flex; align-items: center; gap: 12px; }
      .desktop-masjid-list .masjids-title { font-size: 0; }
      .desktop-masjid-list .masjids-title::after { content: 'All Masjids'; font-size: 1.5rem; font-family: inherit; }
    }
  </style>
