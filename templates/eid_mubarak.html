<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 540px; height: 540px; overflow: hidden;
    background: linear-gradient(180deg, #1a1028 0%, #2a1a3a 30%, #1e1230 60%, #150d20 100%);
    font-family: 'Lato', sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  /* String lights */
  .string-lights { position: absolute; top: 0; left: 0; right: 0; z-index: 2; }

  /* Lanterns */
  .lantern { position: absolute; z-index: 2; }
  .lantern-1 { left: 20px; top: 11px; }
  .lantern-2 { left: 75px; top: 17px; }
  .lantern-3 { left: 140px; top: 12px; }
  .lantern-4 { right: 140px; top: 18px; }
  .lantern-5 { right: 75px; top: 13px; }
  .lantern-6 { right: 20px; top: 6px; }

  @keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  .lantern { transform-origin: top center; animation: sway 4s ease-in-out infinite; }
  .lantern-1 { animation-delay: -1s; }
  .lantern-2 { animation-delay: -2.5s; opacity: 0.5; }
  .lantern-3 { animation-delay: -4s; opacity: 0.4; }
  .lantern-4 { animation-delay: -1.8s; opacity: 0.4; }
  .lantern-5 { animation-delay: -3s; opacity: 0.5; }
  .lantern-6 { animation-delay: -0.5s; }

  /* Content */
  .content {
    text-align: center; z-index: 3; position: relative;
    margin-top: 20px;
  }
  .crescent {
    margin-bottom: 4px;
    filter: drop-shadow(0 0 30px rgba(212,175,55,0.5)) drop-shadow(0 0 60px rgba(212,175,55,0.2));
  }
  .title {
    font-family: 'Lato', sans-serif; font-size: 3rem; font-weight: 700;
    color: #d4af37; margin-bottom: 30px;
    text-shadow: 0 0 30px rgba(212,175,55,0.5), 0 0 60px rgba(212,175,55,0.2), 0 2px 4px rgba(0,0,0,0.3);
  }
  .arabic {
    font-family: 'Amiri', serif; font-size: 1.6rem;
    color: rgba(212,175,55,0.8); margin-bottom: 4px;
    direction: rtl;
  }
  .dua {
    font-family: 'Lato', sans-serif; font-size: 1.15rem;
    color: rgba(212,175,55,0.6); font-style: italic;
  }

  /* Icon watermark */
  .icon {
    position: absolute; bottom: 16px; right: 16px; z-index: 4;
    opacity: 0.35; width: 50px; height: 50px;
  }
  .icon img { width: 100%; height: 100%; }

  .crescent {
    margin-bottom: 16px;
    transform: rotate(-10deg) scale(1.1);
    filter: drop-shadow(0 0 20px rgba(212,175,55,0.4));
  }

  /* Sparkle particles */
  .sparkles { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .sparkle {
    position: absolute; width: 3px; height: 3px; border-radius: 50%;
    background: #d4af37; opacity: 0;
    animation: sparkle 3s ease-in-out infinite;
  }
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.7; transform: scale(1); }
  }
</style>
</head>
<body>

  </div>

  <div class="lantern lantern-6">

  </div>

  <!-- Sparkle particles -->
  <div class="sparkles">
    <div class="sparkle" style="left:15%;top:35%;animation-delay:-0.5s"></div>
    <div class="sparkle" style="left:80%;top:25%;animation-delay:-1.2s"></div>
    <div class="sparkle" style="left:25%;top:70%;animation-delay:-2s"></div>

    <div class="sparkle" style="left:92%;top:40%;animation-delay:-0.7s"></div>

    <div class="sparkle" style="left:75%;top:80%;animation-delay:-0.2s"></div>
    <div class="sparkle" style="left:20%;top:50%;animation-delay:-3.2s"></div>

  <!-- Main content -->
  <div class="content">
    <div class="crescent">
      <img src="crescent2.svg" alt="" width="200" height="200">
    </div>

    <div class="title">Eid Mubarak!</div>
    <div class="arabic">تَقَبَّلَ اللهُ مِنَّا وَمِنكُم</div>
    <div class="dua">Taqabbalallahu minna wa minkum</div>
  </div>

  <!-- Iqamah icon -->
  <div class="icon">
    <img src="../iqamah-icon-transparent.png" alt="">
  </div>
</body>
</html>
