<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 390px;
    height: 844px;
    overflow: hidden;
    font-family: 'Lato', sans-serif;
    color: #f0e6c8;
    position: relative;
    background: linear-gradient(180deg, #050c18, #0a1628 40%, #0d1f15);
  }

  /* Gradient overlays */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% -10%, #1a4a3a, transparent 60%),
      radial-gradient(ellipse at 100% 50%, #0d2d40, transparent 50%),
      radial-gradient(ellipse at 0% 80%, #1a2a0d, transparent 50%);
    z-index: 0;
  }

  /* Islamic geometric pattern overlay */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(60deg, transparent, transparent 28px, rgba(212,175,55,0.03) 28px, rgba(212,175,55,0.03) 29px),
      repeating-linear-gradient(-60deg, transparent, transparent 28px, rgba(212,175,55,0.03) 28px, rgba(212,175,55,0.03) 29px);
    z-index: 1;
    pointer-events: none;
  }

  /* Stars container */
  .stars {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 55%;
    z-index: 2;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.9; }
  }

  /* Crescent moon */
  .moon {
    position: absolute;
    top: 63px;
    right: 30px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #d4af37, #f5d56a);
    box-shadow: 0 0 20px rgba(212,175,55,0.4), 0 0 60px rgba(212,175,55,0.15);
    z-index: 3;
    opacity: 0.45;
  }
  .moon::after {
    content: '';
    position: absolute;
    top: -6px;
    right: -10px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #0a1628;
  }

  /* Iqamah Logo */
  .logo {
    position: absolute;
    top: 63px;
    left: 30px;
    width: 45px;
    height: 45px;
    opacity: 0.35;
    z-index: 3;
  }

  /* Bottom zone */
  .bottom-zone {
    position: absolute;
    top: 285px;
    left: 0;
    right: 0;
    bottom: 145px;
    padding: 0 22px;
    z-index: 5;
    display: flex;
    flex-direction: column;
  }

  /* Date info */
  .date-info {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    z-index: 5;
  }
  .date-part {
    flex: 1;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 10px;
    color: #f0e6c8;
    text-align: center;
  }

  /* Gold divider with diamond */
  .gold-divider {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }
  .gold-divider .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent);
  }
  .gold-divider .diamond {
    width: 8px;
    height: 8px;
    background: #d4af37;
    transform: rotate(45deg);
    margin: 0 8px;
    opacity: 0.6;
  }

  /* Main card — unified table layout */
  .main-card {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Table header */
  .table-header {
    display: grid;
    grid-template-columns: 1fr 1.2fr 1fr;
    padding: 7px 14px;
    border-bottom: 1px solid rgba(212,175,55,0.15);
  }
  .table-header .col {
    font-family: 'Lato', sans-serif;
    font-size: 7px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(212,175,55,0.5);
    text-align: center;
  }
  .table-header .col:first-child { text-align: center; }
  .table-header .col:last-child { text-align: center; }

  /* Prayer rows */
  .times-section {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .time-row {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1.2fr 1fr;
    align-items: center;
    padding: 0 14px;
    border-bottom: 1px solid rgba(212,175,55,0.08);
  }
  .time-row:last-child {
    border-bottom: none;
  }

  .time-start {
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: rgba(240,230,200,0.7);
    text-align: center;
  }

  .time-name {
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: #f0e6c8;
    text-align: center;
    opacity: 0.9;
  }

  .time-jamaat {
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #f5d56a;
    text-align: center;
  }

  .time-start.empty, .time-jamaat.empty {
    color: rgba(212,175,55,0.2);
    font-size: 10px;
  }

  /* Sunrise / Zawal split row */
  .sun-zawal-row {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 14px;
    gap: 0;
    border-bottom: 1px solid rgba(212,175,55,0.15);
  }
  .sun-zawal-cell {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .sun-zawal-label {
    font-family: 'Lato', sans-serif;
    font-size: 8px;
    color: rgba(240,230,200,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .sun-zawal-time {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(240,230,200,0.8);
  }
  .sun-zawal-divider {
    width: 1px;
    height: 18px;
    background: rgba(212,175,55,0.25);
    flex-shrink: 0;
    margin: 0 10px;
  }

  /* Footer with Iqamah branding */
  .footer {
    text-align: center;
    padding: 6px 0 0 0;
    z-index: 5;
  }
  .footer-text {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    color: rgba(212,175,55,0.4);
    letter-spacing: 2px;
  }
  .footer-brand {
    font-family: 'Lato', sans-serif;
    font-size: 8px;
    color: rgba(212,175,55,0.3);
    letter-spacing: 1.5px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Moon -->
<div class="moon"></div>

<!-- Iqamah Logo -->
<img src="iqamah-icon-transparent.png" alt="Iqamah" class="logo">

<!-- Bottom Zone -->
<div class="bottom-zone">
  <div class="date-info">
    <div class="date-part">{{ENGLISH_DATE}}</div>
    <div class="date-part">{{ISLAMIC_DATE}}</div>
  </div>

  <div class="gold-divider">
    <div class="line"></div>
    <div class="diamond"></div>
    <div class="line"></div>
  </div>

  <div class="main-card">
    <div class="sun-zawal-row">
      <div class="sun-zawal-cell"><span class="sun-zawal-label">Sunrise</span><span class="sun-zawal-time">{{SUNRISE}}</span></div>
      <div class="sun-zawal-divider"></div>
      <div class="sun-zawal-cell"><span class="sun-zawal-label">Zawal</span><span class="sun-zawal-time">{{ZAWAL}}</span></div>
    </div>
    <div class="table-header">
      <div class="col">Start</div>
      <div class="col">Prayer</div>
      <div class="col">Jama'at</div>
    </div>
    <div class="times-section">
      <div class="time-row">
        <div class="time-start">{{SEHRI_ENDS}}</div>
        <div class="time-name">Fajr</div>
        <div class="time-jamaat">{{FAJR_JAMAAT}}</div>
      </div>
      <div class="time-row">
        <div class="time-start">{{ZOHR}}</div>
        <div class="time-name">Dhuhr</div>
        <div class="time-jamaat">{{ZOHAR_JAMAAT}}</div>
      </div>
      <div class="time-row">
        <div class="time-start">{{ASR}}</div>
        <div class="time-name">Asr</div>
        <div class="time-jamaat">{{ASR_JAMAAT}}</div>
      </div>
      <div class="time-row">
        <div class="time-start">{{MAGHRIB_IFTARI}}</div>
        <div class="time-name">Maghrib</div>
        <div class="time-jamaat">{{MAGHRIB_JAMAAT}}</div>
      </div>
      <div class="time-row">
        <div class="time-start">{{ESHA}}</div>
        <div class="time-name">Esha</div>
        <div class="time-jamaat">{{ESHA_JAMAAT}}</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">{{MOSQUE_NAME}}</div>
    <div class="footer-brand">Iqamah</div>
  </div>
</div>

<script>
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = (Math.random() * 3) + 's';
    star.style.animationDuration = (2 + Math.random() * 2) + 's';
    const size = Math.random() > 0.85 ? 3 : (Math.random() > 0.5 ? 2 : 1);
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    starsContainer.appendChild(star);
  }
</script>
</body>
</html>
