<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, height=844">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 390px;
    height: 844px;
    overflow: hidden;
    font-family: 'Lato', sans-serif;
    color: #1a1a2e;
    position: relative;
    background: linear-gradient(180deg, #faf6ef, #f5eed9 40%, #f0ebe0);
  }

  /* Gradient overlays */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% -10%, #d4e8d0, transparent 60%),
      radial-gradient(ellipse at 100% 50%, #cce0ec, transparent 50%),
      radial-gradient(ellipse at 0% 80%, #e8e0c8, transparent 50%);
    z-index: 0;
  }

  /* Islamic geometric pattern overlay */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(60deg, transparent, transparent 28px, rgba(180,140,30,0.04) 28px, rgba(180,140,30,0.04) 29px),
      repeating-linear-gradient(-60deg, transparent, transparent 28px, rgba(180,140,30,0.04) 28px, rgba(180,140,30,0.04) 29px);
    z-index: 1;
    pointer-events: none;
  }

  /* Golden dust motes */
  .dust-motes {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 55%;
    z-index: 2;
    pointer-events: none;
  }
  .mote {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(180,140,30,0.4), transparent);
    animation: drift 8s ease-in-out infinite;
  }
  @keyframes drift {
    0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
    50% { transform: translateY(-15px) translateX(8px); opacity: 0.5; }
  }

  /* Crescent moon */
  .moon {
    position: absolute;
    top: 63px;
    right: 30px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #b8941f, #9a7a10);
    box-shadow: 0 0 20px rgba(180,140,30,0.3), 0 0 60px rgba(180,140,30,0.1);
    z-index: 3;
    opacity: 0.45;
  }
  .moon::after {
    content: '';
    position: absolute;
    top: -6px;
    right: -10px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #f5eed9;
  }

  /* Iqamah Logo */
  .logo {
    position: absolute;
    top: 63px;
    left: 30px;
    width: 45px;
    height: 45px;
    opacity: 0.35;
    z-index: 3;
  }

  /* Bottom zone */
  .bottom-zone {
    position: absolute;
    top: 285px;
    left: 0;
    right: 0;
    bottom: 145px;
    padding: 0 22px;
    z-index: 5;
    display: flex;
    flex-direction: column;
  }

  /* Date info */
  .date-info {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    z-index: 5;
  }
  .date-part {
    flex: 1;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 10px;
    color: #1a1a2e;
    text-align: center;
  }

  /* Gold divider with diamond */
  .gold-divider {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }
  .gold-divider .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(180,140,30,0.4), transparent);
  }
  .gold-divider .diamond {
    width: 8px;
    height: 8px;
    background: #b8941f;
    transform: rotate(45deg);
    margin: 0 8px;
    opacity: 0.5;
  }

  /* Main card — unified table layout */
  .main-card {
    flex: 1;
    background: rgba(255,255,255,0.75);
    border: 1px solid rgba(180,140,30,0.2);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Table header */
  .table-header {
    display: grid;
    grid-template-columns: 1fr 1.2fr 1fr;
    padding: 7px 14px;
    border-bottom: 1px solid rgba(180,140,30,0.12);
  }
  .table-header .col {
    font-family: 'Lato', sans-serif;
    font-size: 7px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(180,140,30,0.5);
    text-align: center;
  }
  .table-header .col:first-child { text-align: center; }
  .table-header .col:last-child { text-align: center; }

  /* Prayer rows */
  .times-section {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .time-row {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1.2fr 1fr;
    align-items: center;
    padding: 0 14px;
    border-bottom: 1px solid rgba(180,140,30,0.06);
  }
  .time-row:last-child {
    border-bottom: none;
  }

  .time-start {
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: rgba(26,26,46,0.6);
    text-align: center;
  }

  .time-name {
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: #1a1a2e;
    text-align: center;
    opacity: 0.85;
  }

  .time-jamaat {
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #9a7a10;
    text-align: center;
  }

  .time-start.empty, .time-jamaat.empty {
    color: rgba(180,140,30,0.2);
    font-size: 10px;
  }

  /* Sunrise / Zawal split row */
  .sun-zawal-row {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 14px;
    gap: 0;
    border-bottom: 1px solid rgba(180,140,30,0.12);
  }
  .sun-zawal-cell {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .sun-zawal-label {
    font-family: 'Lato', sans-serif;
    font-size: 8px;
    color: rgba(26,26,46,0.45);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .sun-zawal-time {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(26,26,46,0.7);
  }
  .sun-zawal-divider {
    width: 1px;
    height: 18px;
    background: rgba(180,140,30,0.2);
    flex-shrink: 0;
    margin: 0 10px;
  }

  /* Footer with Iqamah branding */
  .footer {
    text-align: center;
    padding: 6px 0 0 0;
    z-index: 5;
  }
  .footer-text {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    color: rgba(180,140,30,0.4);
    letter-spacing: 2px;
  }
  .footer-brand {
    font-family: 'Lato', sans-serif;
    font-size: 8px;
    color: rgba(180,140,30,0.3);
    letter-spacing: 1.5px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- Golden dust motes -->
<div class="dust-motes" id="dustMotes"></div>

<!-- Moon -->
<div class="moon"></div>

<!-- Iqamah Logo -->
<img src="iqamah-icon-transparent.png" alt="Iqamah" class="logo">

<!-- Bottom Zone -->
<div class="bottom-zone">
  <div class="date-info">
    <div class="date-part">{{ENGLISH_DATE}}</div>
    <div class="date-part">{{ISLAMIC_DATE}}</div>
  </div>

  <div class="gold-divider">
    <div class="line"></div>
    <div class="diamond"></div>
    <div class="line"></div>
  </div>

  <div class="main-card">
    <div class="sun-zawal-row">
      <div class="sun-zawal-cell"><span class="sun-zawal-label">Sunrise</span><span class="sun-zawal-time">{{SUNRISE}}</span></div>
      <div class="sun-zawal-divider"></div>
      <div class="sun-zawal-cell"><span class="sun-zawal-label">Zawal</span><span class="sun-zawal-time">{{ZAWAL}}</span></div>
    </div>
    <div class="table-header">
      <div class="col">Start</div>
      <div class="col">Prayer</div>
      <div class="col">Jama'at</div>
    </div>
    <div class="times-section">
      <div class="time-row">
        <div class="time-start">{{SEHRI_ENDS}}</div>
        <div class="time-name">Fajr</div>
        <div class="time-jamaat">{{FAJR_JAMAAT}}</div>
      </div>
      <div class="time-row">
        <div class="time-start">{{ZOHR}}</div>
        <div class="time-name">Dhuhr</div>
        <div class="time-jamaat">{{ZOHAR_JAMAAT}}</div>
      </div>
      <div class="time-row">
        <div class="time-start">{{ASR}}</div>
        <div class="time-name">Asr</div>
        <div class="time-jamaat">{{ASR_JAMAAT}}</div>
      </div>
      <div class="time-row">
        <div class="time-start">{{MAGHRIB_IFTARI}}</div>
        <div class="time-name">Maghrib</div>
        <div class="time-jamaat">{{MAGHRIB_JAMAAT}}</div>
      </div>
      <div class="time-row">
        <div class="time-start">{{ESHA}}</div>
        <div class="time-name">Esha</div>
        <div class="time-jamaat">{{ESHA_JAMAAT}}</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">{{MOSQUE_NAME}}</div>
    <div class="footer-brand">Iqamah</div>
  </div>
</div>

<script>
  const container = document.getElementById('dustMotes');
  for (let i = 0; i < 60; i++) {
    const mote = document.createElement('div');
    mote.className = 'mote';
    const size = 3 + Math.random() * 5;
    mote.style.width = size + 'px';
    mote.style.height = size + 'px';
    mote.style.left = Math.random() * 100 + '%';
    mote.style.top = Math.random() * 100 + '%';
    mote.style.animationDelay = (Math.random() * 8) + 's';
    mote.style.animationDuration = (6 + Math.random() * 6) + 's';
    container.appendChild(mote);
  }
</script>
</body>
</html>
