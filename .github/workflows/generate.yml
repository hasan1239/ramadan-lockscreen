name: Generate Daily Ramadan Lockscreen

on:
  # Run daily at 12:07am UK time (GMT during Ramadan 2026)
  schedule:
    - cron: '07 0 * * *'

  # Run on push to main branch when relevant files change
  push:
    branches:
      - main
    paths:
      - 'templates/**'
      - 'generate.py'
      - '.github/workflows/generate.yml'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to generate (YYYY-MM-DD), leave blank for today'
        required: false
      mosque:
        description: 'Mosque (faizul / quba / masjid_aisha / all)'
        required: false
        default: 'all'
      template:
        description: 'Template version (e.g. v4, v3, v2, v2.1, v2.2, v2.3, v1)'
        required: false
        default: 'v4'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Regenerate mosque index
        run: |
          # Bundle all mosque configs into index.json so the landing page needs one fetch
          cd data/mosques
          if ls *.json 1> /dev/null 2>&1; then
            jq -s '.' $(ls *.json | grep -v "index.json" | sort) > index.json
            echo "✅ Regenerated data/mosques/index.json"
          else
            echo "⚠️ No mosque configs found, skipping index regeneration"
          fi
          cd ../..

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright Pillow
          playwright install --with-deps chromium

      - name: Determine date, mosque, and template
        id: params
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(TZ='Europe/London' date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
          MOSQUE="${{ github.event.inputs.mosque }}"
          echo "mosque=${MOSQUE:-all}" >> $GITHUB_OUTPUT
          TEMPLATE="${{ github.event.inputs.template }}"
          echo "template=${TEMPLATE:-v4}" >> $GITHUB_OUTPUT

      - name: List available templates
        run: |
          echo "📋 Available templates:"
          ls -1 templates/lockscreen_*.html | sed 's/templates\/lockscreen_/  - /' | sed 's/\.html//'

      - name: Check if date is within Ramadan
        id: check
        run: |
          DATE="${{ steps.params.outputs.date }}"
          if [[ "$DATE" < "2026-02-18" ]] || [[ "$DATE" > "2026-03-19" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ $DATE is outside Ramadan 2026 (18 Feb – 19 Mar). Skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ $DATE is within Ramadan. Generating..."
          fi

      - name: Generate lockscreen(s)
        if: steps.check.outputs.skip == 'false'
        env:
          OUTPUT_DIR: ${{ github.workspace }}/output
        run: |
          python generate.py ${{ steps.params.outputs.mosque }} ${{ steps.params.outputs.date }} --template ${{ steps.params.outputs.template }}

      - name: Clean up old lockscreens
        if: steps.check.outputs.skip == 'false'
        run: |
          # Compute the 3 dates to keep (today, -1d, -2d) in ddmmm format
          KEEP_DATES=""
          for i in 0 1 2; do
            KEEP_DATES="$KEEP_DATES $(date -d "${{ steps.params.outputs.date }} - $i days" +%d%b | tr '[:upper:]' '[:lower:]')"
          done
          echo "Keeping dates: $KEEP_DATES"

          # Remove output files not matching any kept date
          removed=0
          for f in output/ramadan_lockscreen_*.png; do
            [ -e "$f" ] || continue
            keep=false
            for d in $KEEP_DATES; do
              if [[ "$f" == *"_${d}.png" ]]; then
                keep=true
                break
              fi
            done
            if [ "$keep" = false ]; then
              echo "Removing: $f"
              rm "$f"
              removed=$((removed + 1))
            fi
          done
          echo "🧹 Removed $removed old lockscreen(s)"

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ latest/ data/mosques/index.json
          git commit -m "🌙 Lockscreen for ${{ steps.params.outputs.date }}" || echo "No changes to commit"
          git pull --rebase
          git push
