name: Generate Daily Lockscreen

on:
  # Run daily at 12:07am UK time
  schedule:
    - cron: '07 0 * * *'

  # Run on push to main branch when relevant files change
  push:
    branches:
      - main
    paths:
      - 'templates/**'
      - 'generate.py'
      - '.github/workflows/generate.yml'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to generate (YYYY-MM-DD), leave blank for today'
        required: false
      mosque:
        description: 'Mosque (faizul / quba / masjid_aisha / all)'
        required: false
        default: 'all'
      template:
        description: 'Template version (leave blank to auto-detect from season)'
        required: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clear stale pending flags
        shell: python3 {0}
        run: |
          import json, csv, os, glob
          from datetime import datetime
          months = {'Jan':1,'Feb':2,'Mar':3,'Apr':4,'May':5,'Jun':6,'Jul':7,'Aug':8,'Sep':9,'Oct':10,'Nov':11,'Dec':12}
          today = datetime.now().date()
          for path in sorted(glob.glob('data/mosques/*.json')):
              if path.endswith('index.json'):
                  continue
              with open(path) as f:
                  c = json.load(f)
              is_pending_update = c.get('pending_update')
              is_unapproved = c.get('approved') == False
              if not is_pending_update and not is_unapproved:
                  continue
              slug = os.path.basename(path).replace('.json', '')
              csv_path = os.path.join('data', c.get('csv', slug + '.csv'))
              has_future = False
              if os.path.exists(csv_path):
                  with open(csv_path) as f:
                      for row in csv.DictReader(f):
                          parts = row.get('Date', '').strip().split()
                          if len(parts) == 2 and parts[1] in months:
                              d = datetime(2026, months[parts[1]], int(parts[0])).date()
                              if d >= today:
                                  has_future = True
                                  break
              if not has_future:
                  changed = False
                  if is_pending_update:
                      print(f'Clearing pending_update for {slug}')
                      c['pending_update'] = False
                      changed = True
                  if is_unapproved:
                      print(f'Clearing pending review for {slug}')
                      c['approved'] = True
                      changed = True
                  if changed:
                      with open(path, 'w') as f:
                          json.dump(c, f, indent=2)
                          f.write('\n')

      - name: Regenerate mosque index
        run: |
          # Bundle all mosque configs into index.json so the landing page needs one fetch
          cd data/mosques
          if ls *.json 1> /dev/null 2>&1; then
            jq -s '.' $(ls *.json | grep -v "index.json" | sort) > index.json
            echo "✅ Regenerated data/mosques/index.json"
          else
            echo "⚠️ No mosque configs found, skipping index regeneration"
          fi
          cd ../..

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright Pillow
          playwright install --with-deps chromium

      - name: Determine date, mosque, and template
        id: params
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(TZ='Europe/London' date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
          MOSQUE="${{ github.event.inputs.mosque }}"
          echo "mosque=${MOSQUE:-all}" >> $GITHUB_OUTPUT
          TEMPLATE="${{ github.event.inputs.template }}"
          echo "template=${TEMPLATE}" >> $GITHUB_OUTPUT

      - name: List available templates
        run: |
          echo "📋 Available templates:"
          ls -1 templates/lockscreen_*.html | sed 's/templates\/lockscreen_/  - /' | sed 's/\.html//'

      - name: Generate lockscreen(s)
        env:
          OUTPUT_DIR: ${{ github.workspace }}/output
        run: |
          TEMPLATE="${{ steps.params.outputs.template }}"
          if [ -n "$TEMPLATE" ]; then
            python generate.py ${{ steps.params.outputs.mosque }} ${{ steps.params.outputs.date }} --template "$TEMPLATE"
          else
            python generate.py ${{ steps.params.outputs.mosque }} ${{ steps.params.outputs.date }}
          fi

      - name: Clean up old lockscreens
        run: |
          # Compute the 3 dates to keep (today, -1d, -2d) in ddmmm format
          KEEP_DATES=""
          for i in 0 1 2; do
            KEEP_DATES="$KEEP_DATES $(date -d "${{ steps.params.outputs.date }} - $i days" +%d%b | tr '[:upper:]' '[:lower:]')"
          done
          echo "Keeping dates: $KEEP_DATES"

          # Remove output files not matching any kept date
          removed=0
          for f in output/ramadan_lockscreen_*.png; do
            [ -e "$f" ] || continue
            keep=false
            for d in $KEEP_DATES; do
              if [[ "$f" == *"_${d}.png" ]]; then
                keep=true
                break
              fi
            done
            if [ "$keep" = false ]; then
              echo "Removing: $f"
              rm "$f"
              removed=$((removed + 1))
            fi
          done
          echo "🧹 Removed $removed old lockscreen(s)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ latest/ data/mosques/
          git commit -m "🌙 Lockscreen for ${{ steps.params.outputs.date }}" || echo "No changes to commit"
          git pull --rebase
          git push
